name: Migration safety

on:
  push:
    branches: [main]
  pull_request:
    paths:
      - 'drizzle/migrations/**'
      - 'src/lib/db/schema/**'
      - 'scripts/check-migrations.ts'
      - '.github/workflows/migration-safety.yml'

jobs:
  check:
    name: Scan drizzle migrations for D1/Turso unsafe SQL
    runs-on: ubuntu-latest
    permissions:
      contents: read
      security-events: write

    steps:
      - uses: actions/checkout@v6

      - uses: oven-sh/setup-bun@v2
        with:
          bun-version: latest

      - name: Install dependencies
        run: bun install --frozen-lockfile

      - name: Scan migrations
        id: scan
        continue-on-error: true
        run: bun scripts/check-migrations.ts --ci --sarif-out=migration-safety.sarif

      - name: Upload SARIF
        if: always() && hashFiles('migration-safety.sarif') != ''
        uses: github/codeql-action/upload-sarif@v3
        with:
          sarif_file: migration-safety.sarif
          category: migration-safety

      - name: Fail if scan found unresolved issues
        if: steps.scan.outcome == 'failure'
        run: |
          echo "Migration safety scan reported findings. See the Security tab"
          echo "for individual alerts. Dismiss each one with a reason once the"
          echo "migration has been applied manually or refactored."
          exit 1
